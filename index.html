<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>棚卸し表 — Golot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; background: #f0f2f0; color: #222; font-size: 14px; }

    header {
      background: #1e5631;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header span { font-size: 0.85rem; opacity: 0.8; }

    .tabs {
      background: #2c7a4b;
      display: flex;
      gap: 2px;
      padding: 0 16px;
      overflow-x: auto;
    }
    .tab {
      padding: 10px 18px;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      transition: all .15s;
    }
    .tab:hover { color: #fff; }
    .tab.active { color: #fff; border-bottom-color: #7dda9e; font-weight: 600; }

    .container { max-width: 960px; margin: 20px auto; padding: 0 14px; }

    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 16px; overflow: hidden; }

    .card-header {
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }
    .card-header h2 { font-size: 1rem; color: #1e5631; }

    .form-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 14px 18px; background: #f9fdf9; border-bottom: 1px solid #eee; }
    .form-row input, .form-row select {
      flex: 1; min-width: 100px;
      padding: 8px 10px;
      border: 1px solid #ccc; border-radius: 5px;
      font-size: 0.9rem;
    }
    .form-row input:focus { outline: none; border-color: #2c7a4b; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #f4f7f4;
      padding: 9px 12px;
      text-align: left;
      font-size: 0.8rem;
      color: #666;
      border-bottom: 1px solid #e0e0e0;
      white-space: nowrap;
    }
    thead th.right { text-align: right; }
    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:hover { background: #fafff9; }
    tbody td { padding: 8px 12px; font-size: 0.9rem; }
    tbody td.right { text-align: right; }
    tbody td.muted { color: #aaa; }

    .name-input {
      width: 100%; padding: 5px 7px;
      border: 1px solid #ccc; border-radius: 4px;
      font-size: 0.9rem;
    }
    .name-input:focus { outline: none; border-color: #2c7a4b; }
    textarea.wine-wrap {
      width: 100%; min-height: 34px; resize: none; overflow: hidden;
      white-space: pre-wrap; overflow-wrap: break-word; font-family: inherit;
      line-height: 1.4; padding: 6px 7px; border: 1px solid #ccc; border-radius: 4px;
      font-size: 0.9rem; display: block;
    }
    tr.wine-group-header td {
      background: #f4f7f4; color: #1e5631; font-size: 0.85rem;
      padding: 8px 12px; border-bottom: 1px solid #e0e0e0;
    }

    .qty-input {
      width: 70px; padding: 5px 7px;
      border: 1px solid #ccc; border-radius: 4px;
      text-align: right; font-size: 0.9rem;
    }
    .qty-input:focus { outline: none; border-color: #2c7a4b; }

    .btn { padding: 7px 14px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }
    .btn-green { background: #2c7a4b; color: #fff; }
    .btn-green:hover { background: #1e5631; }
    .btn-blue { background: #1a6fa8; color: #fff; }
    .btn-blue:hover { background: #145880; }
    .btn-orange { background: #d97706; color: #fff; }
    .btn-orange:hover { background: #b45309; }
    .btn-del { background: none; border: 1px solid #e53e3e; color: #e53e3e; border-radius: 4px; padding: 3px 8px; font-size: 0.78rem; cursor: pointer; }
    .btn-del:hover { background: #fff5f5; }

    .section-total {
      display: flex; justify-content: flex-end;
      gap: 24px; padding: 12px 18px;
      background: #f4f7f4; border-top: 1px solid #e0e0e0;
      font-size: 0.9rem; color: #444;
    }
    .section-total strong { color: #1e5631; font-size: 1rem; }

    .grand-summary {
      background: #1e5631; color: #fff;
      border-radius: 8px; padding: 18px 22px;
      display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap; gap: 12px;
      margin-bottom: 20px;
    }
    .grand-summary .items { display: flex; gap: 28px; font-size: 0.9rem; opacity: .85; }
    .grand-total { font-size: 1.5rem; font-weight: 700; }

    .tax-badge {
      display: inline-block; font-size: 0.7rem;
      background: #e8f5e9; color: #1e5631;
      border: 1px solid #a5d6a7; border-radius: 3px;
      padding: 1px 4px; margin-left: 4px; vertical-align: middle;
    }

    .top-btns { display: flex; gap: 8px; flex-wrap: wrap; }

    /* サマリータブ */
    .summary-table { width: 100%; border-collapse: collapse; }
    .summary-table th, .summary-table td { padding: 14px 20px; border-bottom: 1px solid #eee; }
    .summary-table th { background: #f4f7f4; text-align: left; font-size: 0.85rem; color: #666; }
    .summary-table td { font-size: 1rem; }
    .summary-table td.amt { text-align: right; font-weight: 600; color: #1e5631; font-size: 1.05rem; }
    .summary-table tr.grand { background: #1e5631; color: #fff; }
    .summary-table tr.grand td { font-size: 1.2rem; font-weight: 700; }
    .summary-table tr.grand td.amt { color: #fff; font-size: 1.3rem; }
    .summary-cat-bar {
      height: 8px; border-radius: 4px; background: #2c7a4b;
      display: inline-block; margin-left: 8px; vertical-align: middle;
    }

    /* 写真OCRモーダル */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 100;
      justify-content: center; align-items: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #fff; border-radius: 10px;
      padding: 24px; width: 90%; max-width: 560px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal h3 { margin-bottom: 14px; color: #1e5631; }
    .drop-zone {
      border: 2px dashed #aaa; border-radius: 8px;
      padding: 32px; text-align: center; cursor: pointer;
      color: #888; transition: border-color .2s;
      margin-bottom: 14px;
    }
    .drop-zone:hover, .drop-zone.drag { border-color: #2c7a4b; color: #2c7a4b; }
    .drop-zone img { max-width: 100%; max-height: 200px; border-radius: 6px; margin-top: 10px; }
    .ocr-status { padding: 10px; background: #f0fdf4; border-radius: 6px; font-size: 0.9rem; color: #166534; margin-bottom: 12px; }
    .ocr-result { border: 1px solid #ddd; border-radius: 6px; padding: 10px; font-size: 0.85rem; color: #444; white-space: pre-wrap; max-height: 160px; overflow-y: auto; margin-bottom: 12px; background: #fafafa; }
    .ocr-fields { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .ocr-fields input { flex: 1; min-width: 100px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.9rem; }
    .ocr-fields input:focus { outline: none; border-color: #2c7a4b; }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-gray { background: #e5e7eb; color: #374151; }
    .btn-gray:hover { background: #d1d5db; }

    .print-name { display: none; }
    .print-val { display: none; }
    .print-title { display: none; }
    #print-combined { display: none; }
    #print-combined .menu-print {
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', serif;

      margin: 0 auto;
      color: #2a2a2a;

      padding-bottom: 14px;
      border-bottom: 2px solid #1e5631;

      letter-spacing: 0.12em;
      color: #1e5631;

      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;

      letter-spacing: 0.02em;

      white-space: nowrap;
      font-family: Georgia, 'Times New Roman', serif;
    }
    #print-combined .menu-item-sub {
      font-size: 0.78rem;
      color: #888;
      letter-spacing: 0.03em;
      margin-top: 2px;
    }
    #print-combined .menu-item-feature {
      font-size: 0.82rem;
      color: #555;
      margin-top: 4px;

    @page { margin: 1cm; size: auto; }

        display: flex !important; flex-direction: column; justify-content: center;

<body>

<header>
  <h1>棚卸し表 — Golot</h1>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end">
    <button class="btn" style="background:rgba(255,255,255,0.15);color:#fff;padding:5px 10px" onclick="changeMonth(-1)">◀</button>
    <span id="month-label" style="font-size:1rem;font-weight:600;min-width:90px;text-align:center"></span>
    <button class="btn" style="background:rgba(255,255,255,0.15);color:#fff;padding:5px 10px" onclick="changeMonth(1)">▶</button>
    <button class="btn" style="background:rgba(255,255,255,0.2);color:#fff;padding:5px 10px;font-size:0.8rem" onclick="exportBackup()">💾 バックアップ</button>
    <label class="btn" style="background:rgba(255,255,255,0.12);color:#fff;padding:5px 10px;font-size:0.8rem;cursor:pointer">
      📂 復元<input type="file" accept=".json" style="display:none" onchange="importBackup(this)">
    </label>
    <button class="btn" style="background:rgba(255,255,255,0.15);color:#fff;padding:5px 10px;font-size:0.8rem" onclick="setAiApiKey()">🤖 AI設定</button>
    <span id="backup-status" style="font-size:0.72rem;opacity:0.75;white-space:nowrap"></span>
  </div>
</header>

<div class="tabs" id="tabs"></div>
<div class="print-title" id="main-print-title">棚卸し表 — Golot</div>
<div id="print-combined"></div>

<div class="container">
  <div id="panel"></div>
  <div class="grand-summary" id="grand-summary-bar">
    <div class="items">
      <div>品目数: <strong id="g-items">0</strong> 種</div>
      <div class="no-print">合計数量: <strong id="g-qty">0</strong></div>
    </div>
    <div class="grand-total">合計 ¥<span id="g-total">0</span>（税込）</div>
  </div>
</div>

<!-- OCRモーダル -->
<div class="modal-bg" id="ocr-modal">
  <div class="modal">
    <h3>写真から品目を追加</h3>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('img-input').click()">
      <div id="drop-text">ここをタップして写真を選択<br><small>（納品書・値札・棚の写真など）</small></div>
      <input type="file" id="img-input" accept="image/*" style="display:none" onchange="loadImage(this)">
    </div>
    <div class="ocr-status" id="ocr-status" style="display:none"></div>
    <div class="ocr-result" id="ocr-result" style="display:none"></div>
    <p style="font-size:0.85rem;color:#666;margin-bottom:10px;">読み取り結果を確認して品目・単価を入力してください</p>
    <div class="ocr-fields">
      <input type="text" id="ocr-name" placeholder="品名" onfocus="selAll(this)" />
      <input type="text" id="ocr-unit" placeholder="単位" style="max-width:70px" onfocus="selAll(this)" />
      <input type="number" id="ocr-price" placeholder="単価（税抜）" min="0" onfocus="selAll(this)" />
      <input type="number" id="ocr-qty" placeholder="数量" min="0" step="0.1" value="1" onfocus="selAll(this)" />
    </div>
    <div style="font-size:0.8rem;color:#888;margin-bottom:12px;">追加先カテゴリ: <strong id="ocr-cat"></strong></div>
    <div class="modal-btns">
      <button class="btn btn-gray" onclick="closeOcr()">キャンセル</button>
      <button class="btn btn-green" onclick="addFromOcr()">追加</button>
    </div>
  </div>
</div>

<!-- ワイン/日本酒 OCRモーダル -->
<div class="modal-bg" id="wine-ocr-modal">
  <div class="modal">
    <h3>写真から品目を追加</h3>
    <div class="drop-zone" id="wine-drop-zone" onclick="document.getElementById('wine-img-input').click()">
      <div id="wine-drop-text">ここをタップして写真を選択<br><small>（ワイン・日本酒のラベル写真）</small></div>
      <input type="file" id="wine-img-input" accept="image/*" style="display:none" onchange="loadWineImage(this)">
    </div>
    <div class="ocr-status" id="wine-ocr-status" style="display:none"></div>
    <div class="ocr-result" id="wine-ocr-result" style="display:none"></div>
    <p style="font-size:0.85rem;color:#666;margin-bottom:10px;">読み取り結果を確認して各項目を入力してください</p>
    <div class="ocr-fields">
      <input type="text" id="wocr-name" placeholder="品名" onfocus="selAll(this)" />
      <input type="text" id="wocr-origin" placeholder="国名/産地" onfocus="selAll(this)" />
      <input type="number" id="wocr-price" placeholder="価格" min="0" onfocus="selAll(this)" />
    </div>
    <div class="ocr-fields" id="wocr-select-row" style="display:none">

      <input type="text" id="wocr-feature" placeholder="特徴" onfocus="selAll(this)" style="flex:1" />
      <button class="btn btn-blue" onclick="generateFeatureAI(event)">🤖 AIで特徴を生成</button>
    </div>
    <div style="font-size:0.8rem;color:#888;margin-bottom:12px;">追加先: <strong id="wocr-cat"></strong></div>

      <button class="btn btn-gray" onclick="closeWineOcr()">キャンセル</button>

    </div>
  </div>
</div>

  '精肉': 1.08, '食材': 1.08, '調味料': 1.08,
  '酒/飲材': 1.10, '備品/包材': 1.10
};
const tin = (p, cat) => Math.round(p * (TAX_RATE[cat] || 1.10));

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// name/price_asc/price_desc は品目一覧全般で共通の並び替え条件
function sortByCommonOrder(items, order) {
  const idx = items.map((item, i) => ({ item, i }));
  switch (order) {
    case 'name':       return idx.sort((a,b) => a.item.name.localeCompare(b.item.name, 'ja'));
    case 'price_asc':  return idx.sort((a,b) => a.item.price - b.item.price);
    case 'price_desc': return idx.sort((a,b) => b.item.price - a.item.price);
    default:           return idx;

let data = {};
let currentMonth = ''; // 'YYYY-MM'

function monthKey(ym) { return `inv_${ym}`; }

function initMonth(ym) {
  currentMonth = ym;
  document.getElementById('month-label').textContent =
    ym.replace(/^(\d{4})-(\d{2})$/, '$1年$2月');
  const saved = localStorage.getItem(monthKey(ym));
  if (saved) {
    data = JSON.parse(saved);
    // priceExがない古いデータをマイグレーション
    DATA_CATS.forEach(cat => {
      data[cat] = (data[cat] || []).map(x => ({
        ...x,
        priceEx: x.priceEx != null ? x.priceEx : Math.round(x.price / (TAX_RATE[cat] || 1.10))
      }));
    });
    // 保存データが空（品目0件）の場合はRAWで再初期化
    const hasItems = DATA_CATS.some(cat => data[cat] && data[cat].length > 0);
    if (hasItems) return;
  }
  // 新しい月: 直近の保存済み月から品目・単価を引き継ぎ、数量だけ0にする
  const prev = latestSavedData();
  if (prev) {
    data = {};
    DATA_CATS.forEach(cat => {
      data[cat] = (prev[cat] || []).map(x => ({
        ...x,
        priceEx: x.priceEx != null ? x.priceEx : Math.round(x.price / (TAX_RATE[cat] || 1.10))
      }));
    });
  } else {
    DATA_CATS.forEach(cat => {
      data[cat] = RAW[cat].map(([name, unit, priceEx, qty]) => ({
        name, unit, priceEx, price: tin(priceEx, cat), qty
      }));
    });
  }
  save();
}

function save() { localStorage.setItem(monthKey(currentMonth), JSON.stringify(data)); }

function latestSavedData() {
  const keys = Object.keys(localStorage)
    .filter(k => k.startsWith('inv_'))
    .sort().reverse();
  if (!keys.length) return null;
  try { return JSON.parse(localStorage.getItem(keys[0])); } catch { return null; }
}

function changeMonth(delta) {
  const [y, m] = currentMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  initMonth(ym);
  renderTabs();
  renderPanel();
}

      </td>
      <td class="amt">¥${Math.round(amt).toLocaleString()}</td>

function renderGrand() {
  let total = 0, items = 0, qty = 0;
  DATA_CATS.forEach(cat => {
    data[cat].forEach(x => {
      total += x.price * x.qty;
      if (x.qty > 0) items++;
      qty += x.qty;
    });
  });
  document.getElementById('g-total').textContent = Math.round(total).toLocaleString();
  document.getElementById('g-items').textContent = items;
  document.getElementById('g-qty').textContent = qty.toLocaleString();
}

function updateQty(cat, i, val) {
  data[cat][i].qty = parseFloat(val) || 0;
  save();
  refreshRow(cat, i);
  refreshSectionTotal(cat);
  renderGrand();
}

function updateName(cat, i, val) {
  data[cat][i].name = val;
  save();
  // print-nameも同期
  const row = document.getElementById(`row-${i}`);
  if (row) { const pn = row.querySelector('.print-name'); if (pn) pn.textContent = val; }
}

function updatePrice(cat, i, val) {
  const priceEx = parseFloat(val) || 0;
  data[cat][i].priceEx = priceEx;
  data[cat][i].price = tin(priceEx, cat);
  save();
  refreshRow(cat, i);
  refreshSectionTotal(cat);
  renderGrand();
}

function refreshRow(cat, i) {
  const item = data[cat][i];
  const sub = item.price * item.qty;
  const subEl = document.getElementById(`sub-${i}`);
  if (subEl) subEl.innerHTML = sub > 0 ? '¥' + Math.round(sub).toLocaleString() : '<span class="muted">—</span>';

  const row = document.getElementById(`row-${i}`);
  if (row) {
    const small = row.querySelector('small');
    if (small) small.textContent = ` →¥${item.price.toLocaleString()}`;
  }

function refreshSectionTotal(cat) {
  const items = data[cat];
  const totalAmt = items.reduce((s,x) => s + x.price * x.qty, 0);
  const totalQty = items.reduce((s,x) => s + x.qty, 0);

    `<span>点数: <strong>${totalQty.toLocaleString()}</strong></span>

  const priceEx = parseFloat(document.getElementById('f-price').value);
  const qty = parseFloat(document.getElementById('f-qty').value) || 0;

function delItem(cat, i) {
  if (!confirm(`「${data[cat][i].name}」を削除しますか？`)) return;
  data[cat].splice(i, 1);
  save(); renderPanel();
}

function downloadCSV() {
  const date = new Date().toLocaleDateString('ja-JP').replace(/\//g,'-');
  let csv = '﻿';
  let grand = 0;
  DATA_CATS.forEach(cat => {
    const taxLabel = TAX_RATE[cat] === 1.08 ? '8%' : '10%';
    csv += `\n【${cat}】（税率${taxLabel}）\n`;
    csv += `品名,単位,単価（税込）,数量,小計（税込）\n`;
    let sub = 0;
    data[cat].forEach(x => {
      const amt = Math.round(x.price * x.qty);
      sub += amt;
      csv += `"${x.name}","${x.unit}",${x.price},${x.qty},${amt}\n`;
    });
    csv += `,,,,小計,${Math.round(sub)}\n`;
    grand += sub;
  });
  csv += `\n合計（税込）,,,,,${Math.round(grand)}\n`;
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `棚卸し表_${currentMonth}.csv`;
  a.click();
}

function openOcr() {
  document.getElementById('ocr-cat').textContent = activeTab;
  document.getElementById('ocr-status').style.display = 'none';
  document.getElementById('ocr-result').style.display = 'none';
  document.getElementById('ocr-name').value = '';
  document.getElementById('ocr-unit').value = '';
  document.getElementById('ocr-price').value = '';
  document.getElementById('ocr-qty').value = '1';
  document.getElementById('drop-text').innerHTML = 'ここをタップして写真を選択<br><small>（納品書・値札・棚の写真など）</small>';
  const old = document.getElementById('drop-zone').querySelector('img');
  if (old) old.remove();
  document.getElementById('img-input').value = '';
  document.getElementById('ocr-modal').classList.add('open');
}

function closeOcr() {
  document.getElementById('ocr-modal').classList.remove('open');
}

function loadImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dz = document.getElementById('drop-zone');
    const old = dz.querySelector('img');
    if (old) old.remove();
    const img = document.createElement('img');
    img.src = e.target.result;
    dz.appendChild(img);
    document.getElementById('drop-text').textContent = '';
    runOcr(e.target.result);
  };
  reader.readAsDataURL(file);
}

async function runOcr(src) {
  const status = document.getElementById('ocr-status');
  const result = document.getElementById('ocr-result');
  status.style.display = 'block';
  status.textContent = '読み取り中...';
  result.style.display = 'none';
  try {
    const { data: { text } } = await Tesseract.recognize(src, 'jpn+eng', {
      logger: m => {
        if (m.status === 'recognizing text') {
          status.textContent = `読み取り中... ${Math.round(m.progress*100)}%`;
        }
      }
    });
    status.textContent = '読み取り完了。内容を確認して品目・単価を入力してください。';
    result.style.display = 'block';
    result.textContent = text;

    // 数字っぽいものを価格候補として自動入力
    const prices = text.match(/[\d,]+円|¥[\d,]+|[\d]{3,6}/g);
    if (prices) {
      const num = prices[prices.length-1].replace(/[円¥,]/g,'');
      if (!isNaN(num) && num > 0) {
        document.getElementById('ocr-price').value = num;
      }
    }
  } catch(e) {
    status.textContent = '読み取りに失敗しました。手動で入力してください。';
  }
}

function addFromOcr() {
  const name = document.getElementById('ocr-name').value.trim();
  const unit = document.getElementById('ocr-unit').value.trim() || '—';
  const priceEx = parseFloat(document.getElementById('ocr-price').value);
  const qty = parseFloat(document.getElementById('ocr-qty').value) || 0;
  if (!name || isNaN(priceEx)) { alert('品名と単価を入力してください'); return; }
  data[activeTab].push({ name, unit, priceEx, price: tin(priceEx, activeTab), qty });
  save();
  closeOcr();
  renderPanel();
}

let wineData = {};
function loadWineData() {
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(WINE_STORE_KEY)); }
  catch { saved = null; }
  if (saved) {
    wineData = saved;
    Object.values(WINE_CONFIG).forEach(cfg => {
      if (!wineData[cfg.storeKey]) wineData[cfg.storeKey] = [];
    });
  } else {
    wineData = JSON.parse(JSON.stringify(WINE_SEED_DATA));
    saveWineData();
  }
}
function saveWineData() { localStorage.setItem(WINE_STORE_KEY, JSON.stringify(wineData)); }

let wineSortOrder = 'default';
function setWineSortOrder(val) { wineSortOrder = val; renderPanel(); }
function sortedWineItems(items) { return sortByCommonOrder(items, wineSortOrder); }

function wineWrapField(cfg, storeKey, i, field, value, placeholder) {
  return `<textarea class="name-input wine-wrap" rows="1" placeholder="${placeholder||''}" onfocus="selAll(this)" oninput="updateWineField('${storeKey}',${i},'${field}',this.value);autoGrowWine(this)">${escapeHtml(value||'')}</textarea>`;
}

function renderWineRow(cfg, item, i) {
  const selectCell = cfg.hasSelect ? `
    <td>
      <select class="name-input" onchange="updateWineField('${cfg.storeKey}',${i},'${cfg.selectField}',this.value)">
        ${cfg.selectOptions.map(o => `<option value="${escapeHtml(o)}" ${item[cfg.selectField]===o?'selected':''}>${escapeHtml(o)}</option>`).join('')}
      </select>
    </td>` : '';
  return `<tr id="wine-row-${i}">
    <td>${wineWrapField(cfg, cfg.storeKey, i, 'name', item.name)}</td>
    <td>${wineWrapField(cfg, cfg.storeKey, i, 'origin', item.origin)}</td>
    <td class="right"><input class="qty-input" type="number" min="0" value="${item.price||0}" onfocus="selAll(this)" oninput="updateWineField('${cfg.storeKey}',${i},'price',this.value)" style="width:80px;text-align:right"></td>
    ${selectCell}
    <td>${wineWrapField(cfg, cfg.storeKey, i, 'feature', item.feature)}</td>
    <td><button class="btn-del" onclick="delWineItem('${cfg.storeKey}',${i})">削除</button></td>
  </tr>`;
}

function autoGrowWine(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function renderWinePanel(cat) {
  const cfg = WINE_CONFIG[cat];
  const items = wineData[cfg.storeKey];
  const sorted = sortedWineItems(items);
  const selectHeader = cfg.hasSelect ? `<th>${cfg.selectLabel}</th>` : '';
  let rows;
  if (cfg.groupBySelect) {
    rows = cfg.selectOptions.map(opt => {
      const group = sorted.filter(({ item }) => (item[cfg.selectField] || cfg.selectOptions[0]) === opt);
      if (!group.length) return '';
      const colspan = 4 + (cfg.hasSelect ? 1 : 0) + 1;
      const groupRows = group.map(({ item, i }) => renderWineRow(cfg, item, i)).join('');
      return `<tr class="wine-group-header"><td colspan="${colspan}"><strong>${escapeHtml(opt)}ワイン</strong></td></tr>${groupRows}`;
    }).join('');
  } else {
    rows = sorted.map(({ item, i }) => renderWineRow(cfg, item, i)).join('');
  }

  document.getElementById('panel').innerHTML = `
    <div class="card">
      <div class="card-header">
        <h2>${cat} <span style="font-size:0.85rem;font-weight:400;color:#555;margin-left:12px">品目数: <strong style="color:#1e5631">${items.length}</strong></span></h2>
        <div class="top-btns">
          <button class="btn btn-orange" onclick="openWineOcr('${cat}')">写真から追加</button>
          <button class="btn btn-blue" onclick="downloadWineCSV('${cat}')">CSVダウンロード</button>
          <button class="btn btn-orange" onclick="printWineTab('${cat}')">印刷</button>
        </div>
      </div>
      <div class="form-row">
        <input type="text" id="wf-name" placeholder="${cfg.idLabel}" onfocus="selAll(this)" />
        <input type="text" id="wf-origin" placeholder="${cfg.originLabel}" onfocus="selAll(this)" />
        <input type="number" id="wf-price" placeholder="価格" min="0" onfocus="selAll(this)" />
        ${cfg.hasSelect ? `<select id="wf-select">${cfg.selectOptions.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>` : ''}
        <input type="text" id="wf-feature" placeholder="特徴" onfocus="selAll(this)" />
        <button class="btn btn-green" onclick="addWineItem('${cat}')">追加</button>
        <select onchange="setWineSortOrder(this.value)" style="flex:none;padding:7px 8px;border:1px solid #ccc;border-radius:5px;font-size:0.85rem;color:#444">
          <option value="default" ${wineSortOrder==='default'?'selected':''}>登録順</option>
          <option value="name" ${wineSortOrder==='name'?'selected':''}>あいうえお順</option>

          <option value="price_desc" ${wineSortOrder==='price_desc'?'selected':''}>価格↓高い順</option>

          <th>${cfg.idLabel}</th><th>${cfg.originLabel}</th><th class="right">価格</th>${selectHeader}<th>特徴</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  document.querySelectorAll('#panel textarea.wine-wrap').forEach(autoGrowWine);
}

function addWineItem(cat) {
  const cfg = WINE_CONFIG[cat];
  const name = document.getElementById('wf-name').value.trim();
  const origin = document.getElementById('wf-origin').value.trim();
  const price = parseFloat(document.getElementById('wf-price').value) || 0;
  const feature = document.getElementById('wf-feature').value.trim();
  if (!name) { alert(`${cfg.idLabel}を入力してください`); return; }
  const item = { name, origin, price, feature };
  if (cfg.hasSelect) item[cfg.selectField] = document.getElementById('wf-select').value;
  wineData[cfg.storeKey].push(item);
  saveWineData();
  renderPanel();
}

function delWineItem(storeKey, i) {
  if (!confirm(`「${wineData[storeKey][i].name}」を削除しますか？`)) return;
  wineData[storeKey].splice(i, 1);
  saveWineData();
  renderPanel();
}

function updateWineField(storeKey, i, field, value) {
  const item = wineData[storeKey][i];
  item[field] = field === 'price' ? (parseFloat(value) || 0) : value;
  saveWineData();
}

function downloadWineCSV(cat) {
  const cfg = WINE_CONFIG[cat];
  const items = wineData[cfg.storeKey];
  let csv = '﻿';
  const headers = [cfg.idLabel, cfg.originLabel, '価格'];
  if (cfg.hasSelect) headers.push(cfg.selectLabel);
  headers.push('特徴');
  csv += headers.join(',') + '\n';
  items.forEach(x => {
    const row = [x.name, x.origin, x.price];
    if (cfg.hasSelect) row.push(x[cfg.selectField] || '');
    row.push(x.feature || '');
    csv += row.map(v => `"${String(v ?? '').replace(/"/g,'""')}"`).join(',') + '\n';
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${cat}.csv`;
  a.click();
}

      ${x.feature ? `<div class="menu-item-feature">${escapeHtml(x.feature)}</div>` : ''}

function wineSectionHTML(cat, sectionLabel) {
  const cfg = WINE_CONFIG[cat];
  const items = wineData[cfg.storeKey];
  if (cfg.groupBySelect) {
    return cfg.selectOptions.map(opt => {
      const group = items.filter(x => (x[cfg.selectField] || cfg.selectOptions[0]) === opt);
      if (!group.length) return '';

      return `<h2>${escapeHtml(opt)}ワイン</h2><div class="menu-section">${itemsHtml}</div>`;

  return `

function loadWineImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dz = document.getElementById('wine-drop-zone');
    const old = dz.querySelector('img');
    if (old) old.remove();
    const img = document.createElement('img');
    img.src = e.target.result;
    dz.appendChild(img);
    document.getElementById('wine-drop-text').textContent = '';
    runWineOcr(e.target.result);
  };
  reader.readAsDataURL(file);
}

async function recognizeLabelText(src, onProgress) {
  const { data: { text } } = await Tesseract.recognize(src, 'jpn+eng', {
    logger: m => {
      if (m.status === 'recognizing text' && onProgress) onProgress(Math.round(m.progress*100));
    }
  });
  return text;
}

async function runWineOcr(src) {
  const status = document.getElementById('wine-ocr-status');
  const result = document.getElementById('wine-ocr-result');
  status.style.display = 'block';
  status.textContent = '読み取り中...';
  result.style.display = 'none';
  try {
    const text = await recognizeLabelText(src, pct => status.textContent = `読み取り中... ${pct}%`);
    wineOcrLastText = text;
    status.textContent = '読み取り完了。内容を確認して各項目を入力してください。';
    result.style.display = 'block';
    result.textContent = text;

    const prices = text.match(/[\d,]+円|¥[\d,]+|[\d]{3,6}/g);
    if (prices) {
      const num = prices[prices.length-1].replace(/[円¥,]/g,'');
      if (!isNaN(num) && num > 0) document.getElementById('wocr-price').value = num;
    }
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    if (lines.length) document.getElementById('wocr-name').value = lines[0];
  } catch (e) {
    status.textContent = '読み取りに失敗しました。手動で入力してください。';
  }
}

  wineData[cfg.storeKey].push(item);
  saveWineData();
  closeWineOcr();
  renderPanel();
}

// ---- AI特徴生成 ----
const WINE_AI_KEY_STORAGE = 'wine_ai_api_key';
function getAiApiKey() { return localStorage.getItem(WINE_AI_KEY_STORAGE) || ''; }
function setAiApiKey() {
  const key = prompt('AI（Claude）APIキーを入力してください。空欄で保存すると削除されます。', getAiApiKey());
  if (key !== null) localStorage.setItem(WINE_AI_KEY_STORAGE, key.trim());
}

async function generateFeatureAI(evt) {
  const apiKey = getAiApiKey();
  if (!apiKey) { alert('先にヘッダーの「AI設定」からAPIキーを登録してください'); return; }
  if (!wineOcrLastText) { alert('先に写真を読み込んでください'); return; }
  const btn = evt.target;
  const original = btn.textContent;
  btn.textContent = '生成中...';
  btn.disabled = true;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 200,
        messages: [{
          role: 'user',
          content: `以下はお酒のラベルをOCRで読み取ったテキストです。このお酒の特徴を、接客用メニュー表に載せる1〜2文の日本語の紹介文として書いてください。読み取れない情報は無理に補完せず、わかる範囲で書いてください。\n\n${wineOcrLastText}`
        }]
      })
    });
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const json = await res.json();
    const text = json.content && json.content[0] && json.content[0].text ? json.content[0].text.trim() : '';
    if (text) document.getElementById('wocr-feature').value = text;
    else throw new Error('empty response');
  } catch (e) {
    alert('AI生成に失敗しました。手動で入力してください。');
  } finally {
    btn.textContent = original;
    btn.disabled = false;
  }
}

function exportBackup() {
  const out = {};
  Object.keys(localStorage).filter(k => k.startsWith('inv_') && !k.startsWith('inv_autobk_')).forEach(k => {
    out[k] = JSON.parse(localStorage.getItem(k));
  });
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = `棚卸しバックアップ_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  showBackupStatus('ダウンロード完了 ✓');
}

function importBackup(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const obj = JSON.parse(e.target.result);
      let count = 0;
      Object.keys(obj).forEach(k => {
        if (k.startsWith('inv_')) { localStorage.setItem(k, JSON.stringify(obj[k])); count++; }
      });
      alert(`${count}ヶ月分のデータを復元しました。`);
      initMonth(currentMonth); renderTabs(); renderPanel();
    } catch { alert('ファイルが壊れています'); }
  };
  reader.readAsText(file);
  input.value = '';
}

// ---- 並び替え ----
let sortOrder = 'default';
function setSortOrder(val) { sortOrder = val; renderPanel(); }
function sortedItems(items) {
  switch (sortOrder) {
    case 'qty_asc':  { const idx = items.map((item, i) => ({ item, i })); return idx.sort((a,b) => a.item.qty - b.item.qty); }
    case 'qty_desc': { const idx = items.map((item, i) => ({ item, i })); return idx.sort((a,b) => b.item.qty - a.item.qty); }
    case 'sub_desc': { const idx = items.map((item, i) => ({ item, i })); return idx.sort((a,b) => (b.item.price*b.item.qty)-(a.item.price*a.item.qty)); }
    default: return sortByCommonOrder(items, sortOrder);
  }
}

// drag & drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const input = document.getElementById('img-input');
    const dt = new DataTransfer();
    dt.items.add(file);
    input.files = dt.files;
    loadImage(input);
  }
});

// フォーカス時：前の値を記憶し、クリアを試みる＋「最初の入力」フラグを立てる
function selAll(el) {
  el.dataset.prev = el.value;
  el.dataset.fresh = '1';
  el.value = '';
}

// 最初の1文字入力時に、もし前の値が消えずに残っていたら取り除く（モバイル対策）
// capture段階で実行し、updatePrice/updateQtyより先に値を補正する
document.getElementById('panel').addEventListener('input', e => {
  const el = e.target;
  if (!el.classList.contains('qty-input')) return;
  if (el.dataset.fresh !== '1') return;
  el.dataset.fresh = '';
  const prev = el.dataset.prev || '';
  // 前の値が残ったまま新しい文字が後ろに付いた場合（例: "4"→"47"）、前の値を削る
  if (prev && el.value.length > prev.length && el.value.startsWith(prev)) {
    el.value = el.value.slice(prev.length);
  }
}, true);
// フォーカスが外れたとき、未入力なら元の値に戻す
function blurNum(el, cat, i, type) {
  if (el.value !== '') return;
  el.value = el.dataset.prev || '0';
  if (type === 'qty') updateQty(cat, i, el.value);
  else updatePrice(cat, i, el.value);
}

// Enter キー → 同じ列の下の行へ移動
document.getElementById('panel').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const inp = e.target;
  if (!inp.dataset.navCol) return;
  e.preventDefault();
  const row = parseInt(inp.dataset.navRow);
  const col = inp.dataset.navCol;
  const next = document.querySelector(`[data-nav-row="${row + 1}"][data-nav-col="${col}"]`);
  if (next) {
    next.focus();
  }
});

const now = new Date();
const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
initMonth(thisMonth);
loadWineData();
renderTabs();
renderPanel();
</script>
