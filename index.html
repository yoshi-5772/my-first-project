<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>棚卸し表 — Golot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; background: #f0f2f0; color: #222; font-size: 14px; }

    header {
      background: #1e5631;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header span { font-size: 0.85rem; opacity: 0.8; }

    .tabs {
      background: #2c7a4b;
      display: flex;
      gap: 2px;
      padding: 0 16px;
      overflow-x: auto;
    }
    .tab {
      padding: 10px 18px;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      transition: all .15s;
    }
    .tab:hover { color: #fff; }
    .tab.active { color: #fff; border-bottom-color: #7dda9e; font-weight: 600; }

    .container { max-width: 960px; margin: 20px auto; padding: 0 14px; }

    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 16px; overflow: hidden; }

    .card-header {
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }
    .card-header h2 { font-size: 1rem; color: #1e5631; }

    .form-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 14px 18px; background: #f9fdf9; border-bottom: 1px solid #eee; }
    .form-row input, .form-row select {
      flex: 1; min-width: 100px;
      padding: 8px 10px;
      border: 1px solid #ccc; border-radius: 5px;
      font-size: 0.9rem;
    }
    .form-row input:focus, .form-row select:focus { outline: none; border-color: #2c7a4b; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #f4f7f4;
      padding: 9px 12px;
      text-align: left;
      font-size: 0.8rem;
      color: #666;
      border-bottom: 1px solid #e0e0e0;
      white-space: nowrap;
    }
    thead th.right { text-align: right; }
    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:hover { background: #fafff9; }
    tbody td { padding: 8px 12px; font-size: 0.9rem; }
    tbody td.right { text-align: right; }
    tbody td.muted { color: #aaa; }

    .qty-input {
      width: 70px; padding: 5px 7px;
      border: 1px solid #ccc; border-radius: 4px;
      text-align: right; font-size: 0.9rem;
    }
    .qty-input:focus { outline: none; border-color: #2c7a4b; }

    .btn { padding: 7px 14px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }
    .btn-green { background: #2c7a4b; color: #fff; }
    .btn-green:hover { background: #1e5631; }
    .btn-blue { background: #1a6fa8; color: #fff; }
    .btn-blue:hover { background: #145880; }
    .btn-sm { padding: 4px 9px; font-size: 0.8rem; }
    .btn-del { background: none; border: 1px solid #e53e3e; color: #e53e3e; border-radius: 4px; padding: 3px 8px; font-size: 0.78rem; cursor: pointer; }
    .btn-del:hover { background: #fff5f5; }

    .section-total {
      display: flex; justify-content: flex-end;
      gap: 24px; padding: 12px 18px;
      background: #f4f7f4; border-top: 1px solid #e0e0e0;
      font-size: 0.9rem; color: #444;
    }
    .section-total strong { color: #1e5631; font-size: 1rem; }

    .grand-summary {
      background: #1e5631; color: #fff;
      border-radius: 8px; padding: 18px 22px;
      display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap; gap: 12px;
    }
    .grand-summary .items { display: flex; gap: 28px; font-size: 0.9rem; opacity: .85; }
    .grand-total { font-size: 1.5rem; font-weight: 700; }

    .tax-badge {
      display: inline-block; font-size: 0.7rem;
      background: #e8f5e9; color: #1e5631;
      border: 1px solid #a5d6a7; border-radius: 3px;
      padding: 1px 4px; margin-left: 4px; vertical-align: middle;
    }

    .top-btns { display: flex; gap: 8px; }

    @media (max-width: 600px) {
      thead th:nth-child(3), tbody td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

  <span id="date-label"></span>

      <div>合計数量: <strong id="g-qty">0</strong></div>
    </div>
    <div class="grand-total">合計 ¥<span id="g-total">0</span>（税込）</div>

let data = {};

function initData() {
  const saved = localStorage.getItem('inv3');
  if (saved) {
    data = JSON.parse(saved);
    return;
  }
  CATEGORIES.forEach(cat => {
    data[cat] = RAW[cat].map(([name, unit, priceEx, qty]) => ({
      name, unit,
      priceEx,
      price: tin(priceEx, cat),
      qty
    }));
  });
  save();
}

function save() { localStorage.setItem('inv3', JSON.stringify(data)); }

let activeTab = '精肉';

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = CATEGORIES.map(c =>
    `<div class="tab ${c===activeTab?'active':''}" onclick="switchTab('${c}')">${c}</div>`
  ).join('');
}

function switchTab(cat) {
  activeTab = cat;
  renderTabs();
  renderPanel();
}

function renderPanel() {
  const items = data[activeTab];
  const totalAmt = items.reduce((s,x) => s + x.price * x.qty, 0);
  const totalQty = items.reduce((s,x) => s + x.qty, 0);

  let rows = items.map((item, i) => {
    const sub = item.price * item.qty;
    return `<tr>
      <td>${item.name}</td>
      <td class="muted">${item.unit}</td>
      <td class="right">¥${item.price.toLocaleString()}</td>
      <td class="right">
        <input class="qty-input" type="number" min="0" step="0.1"
          value="${item.qty}" onchange="updateQty('${activeTab}',${i},this.value)">
      </td>
      <td class="right">${sub>0 ? '¥'+Math.round(sub).toLocaleString() : '<span class="muted">—</span>'}</td>
      <td><button class="btn-del" onclick="delItem('${activeTab}',${i})">削除</button></td>
    </tr>`;
  }).join('');

  document.getElementById('panel').innerHTML = `
    <div class="card">
      <div class="card-header">
        <h2>${activeTab}</h2>
        <div class="top-btns">
          <button class="btn btn-blue" onclick="downloadCSV()">CSVダウンロード</button>
        </div>
      </div>
      <div class="form-row">
        <input type="text" id="f-name" placeholder="品名" />
        <input type="text" id="f-unit" placeholder="単位" style="max-width:70px" />
        <input type="number" id="f-price" placeholder="単価（税抜）" min="0" />
        <input type="number" id="f-qty" placeholder="数量" min="0" step="0.1" value="1" />
        <button class="btn btn-green" onclick="addItem()">追加</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>品名</th>
            <th>単位</th>
            <th class="right">単価（税込）<span class="tax-badge">${TAX_RATE[activeTab]===1.08?'8%':'10%'}込</span></th>
            <th class="right">数量</th>
            <th class="right">小計（税込）</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="section-total">
        <span>点数: <strong>${totalQty.toLocaleString()}</strong></span>
        <span>小計: <strong>¥${Math.round(totalAmt).toLocaleString()}</strong></span>
      </div>
    </div>`;

  renderGrand();
}

function renderGrand() {
  let total = 0, items = 0, qty = 0;
  CATEGORIES.forEach(cat => {
    data[cat].forEach(x => {
      total += x.price * x.qty;
      if (x.qty > 0) items++;
      qty += x.qty;
    });
  });
  document.getElementById('g-total').textContent = Math.round(total).toLocaleString();
  document.getElementById('g-items').textContent = items;
  document.getElementById('g-qty').textContent = qty.toLocaleString();
}

function updateQty(cat, i, val) {
  data[cat][i].qty = parseFloat(val) || 0;
  save();
  renderGrand();
  // update section total only
  const items = data[cat];
  const totalAmt = items.reduce((s,x) => s + x.price * x.qty, 0);
  const totalQty = items.reduce((s,x) => s + x.qty, 0);
  document.querySelector('.section-total').innerHTML =
    `<span>点数: <strong>${totalQty.toLocaleString()}</strong></span>
     <span>小計: <strong>¥${Math.round(totalAmt).toLocaleString()}</strong></span>`;
}

function addItem() {
  const name = document.getElementById('f-name').value.trim();
  const unit = document.getElementById('f-unit').value.trim() || '—';
  const priceEx = parseFloat(document.getElementById('f-price').value);
  const qty = parseFloat(document.getElementById('f-qty').value) || 0;
  if (!name || isNaN(priceEx)) { alert('品名と単価を入力してください'); return; }
  data[activeTab].push({ name, unit, priceEx, price: tin(priceEx, activeTab), qty });
  save();
  document.getElementById('f-name').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-qty').value = '1';
  renderPanel();
}

function delItem(cat, i) {
  if (!confirm(`「${data[cat][i].name}」を削除しますか？`)) return;
  data[cat].splice(i, 1);
  save();
  renderPanel();
}

function downloadCSV() {
  const date = new Date().toLocaleDateString('ja-JP').replace(/\//g,'-');
  let csv = '﻿部門,品名,単位,単価（税込）,数量,小計（税込）\n';
  CATEGORIES.forEach(cat => {
    data[cat].forEach(x => {
      csv += `"${cat}","${x.name}","${x.unit}",${x.price},${x.qty},${Math.round(x.price*x.qty)}\n`;
    });
  });
  const grand = CATEGORIES.flatMap(c=>data[c]).reduce((s,x)=>s+x.price*x.qty,0);
  csv += `,,,,合計（税込）,${Math.round(grand)}\n`;
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `棚卸し表_${date}.csv`;
  a.click();
}

document.getElementById('date-label').textContent =
  new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});

initData();
renderTabs();
renderPanel();
</script>
</body>
</html>
