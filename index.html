<!DOCTYPE html>
<html lang="ja">

    header {
      background: #1e5631;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header span { font-size: 0.85rem; opacity: 0.8; }

    .tabs {
      background: #2c7a4b;
      display: flex;
      gap: 2px;
      padding: 0 16px;
      overflow-x: auto;
    }
    .tab {
      padding: 10px 18px;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      transition: all .15s;
    }
    .tab:hover { color: #fff; }
    .tab.active { color: #fff; border-bottom-color: #7dda9e; font-weight: 600; }

    .container { max-width: 960px; margin: 20px auto; padding: 0 14px; }

    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 16px; overflow: hidden; }

    .card-header {
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }
    .card-header h2 { font-size: 1rem; color: #1e5631; }

    .form-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 14px 18px; background: #f9fdf9; border-bottom: 1px solid #eee; }
    .form-row input, .form-row select {
      flex: 1; min-width: 100px;
      padding: 8px 10px;
      border: 1px solid #ccc; border-radius: 5px;
      font-size: 0.9rem;
    }
    .form-row input:focus { outline: none; border-color: #2c7a4b; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #f4f7f4;
      padding: 9px 12px;
      text-align: left;
      font-size: 0.8rem;
      color: #666;
      border-bottom: 1px solid #e0e0e0;
      white-space: nowrap;
    }
    thead th.right { text-align: right; }
    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:hover { background: #fafff9; }
    tbody td { padding: 8px 12px; font-size: 0.9rem; }
    tbody td.right { text-align: right; }
    tbody td.muted { color: #aaa; }

    .name-input {
      width: 100%; padding: 5px 7px;
      border: 1px solid #ccc; border-radius: 4px;
      font-size: 0.9rem;
    }
    .name-input:focus { outline: none; border-color: #2c7a4b; }

    .qty-input {
      width: 70px; padding: 5px 7px;
      border: 1px solid #ccc; border-radius: 4px;
      text-align: right; font-size: 0.9rem;
    }
    .qty-input:focus { outline: none; border-color: #2c7a4b; }

    .btn { padding: 7px 14px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }
    .btn-green { background: #2c7a4b; color: #fff; }
    .btn-green:hover { background: #1e5631; }
    .btn-blue { background: #1a6fa8; color: #fff; }
    .btn-blue:hover { background: #145880; }
    .btn-orange { background: #d97706; color: #fff; }
    .btn-orange:hover { background: #b45309; }
    .btn-del { background: none; border: 1px solid #e53e3e; color: #e53e3e; border-radius: 4px; padding: 3px 8px; font-size: 0.78rem; cursor: pointer; }
    .btn-del:hover { background: #fff5f5; }

    .section-total {
      display: flex; justify-content: flex-end;
      gap: 24px; padding: 12px 18px;
      background: #f4f7f4; border-top: 1px solid #e0e0e0;
      font-size: 0.9rem; color: #444;
    }
    .section-total strong { color: #1e5631; font-size: 1rem; }

    .grand-summary {
      background: #1e5631; color: #fff;
      border-radius: 8px; padding: 18px 22px;
      display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap; gap: 12px;
      margin-bottom: 20px;
    }
    .grand-summary .items { display: flex; gap: 28px; font-size: 0.9rem; opacity: .85; }
    .grand-total { font-size: 1.5rem; font-weight: 700; }

    .tax-badge {
      display: inline-block; font-size: 0.7rem;
      background: #e8f5e9; color: #1e5631;
      border: 1px solid #a5d6a7; border-radius: 3px;
      padding: 1px 4px; margin-left: 4px; vertical-align: middle;
    }

    .top-btns { display: flex; gap: 8px; flex-wrap: wrap; }

    /* サマリータブ */
    .summary-table { width: 100%; border-collapse: collapse; }
    .summary-table th, .summary-table td { padding: 14px 20px; border-bottom: 1px solid #eee; }
    .summary-table th { background: #f4f7f4; text-align: left; font-size: 0.85rem; color: #666; }
    .summary-table td { font-size: 1rem; }
    .summary-table td.amt { text-align: right; font-weight: 600; color: #1e5631; font-size: 1.05rem; }
    .summary-table tr.grand { background: #1e5631; color: #fff; }
    .summary-table tr.grand td { font-size: 1.2rem; font-weight: 700; }
    .summary-table tr.grand td.amt { color: #fff; font-size: 1.3rem; }
    .summary-cat-bar {
      height: 8px; border-radius: 4px; background: #2c7a4b;
      display: inline-block; margin-left: 8px; vertical-align: middle;
    }

    /* 写真OCRモーダル */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 100;
      justify-content: center; align-items: center;
    }
    .modal-bg.open { display: flex; }
    .modal {

    }
    .modal h3 { margin-bottom: 14px; color: #1e5631; }
    .drop-zone {
      border: 2px dashed #aaa; border-radius: 8px;

      color: #888; transition: border-color .2s;
      margin-bottom: 14px;
    }

    .drop-zone img { max-width: 100%; max-height: 200px; border-radius: 6px; margin-top: 10px; }
    .ocr-status { padding: 10px; background: #f0fdf4; border-radius: 6px; font-size: 0.9rem; color: #166534; margin-bottom: 12px; }
    .ocr-result { border: 1px solid #ddd; border-radius: 6px; padding: 10px; font-size: 0.85rem; color: #444; white-space: pre-wrap; max-height: 120px; overflow-y: auto; margin-bottom: 12px; background: #fafafa; }
    .ocr-item-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
    .ocr-item-table th { background: #f4f7f4; padding: 7px 8px; font-size: 0.8rem; color: #666; border-bottom: 1px solid #e0e0e0; text-align: left; }

    .ocr-item-table input[type=text], .ocr-item-table input[type=number] {

      .container { margin: 0; padding: 0; }

</head>

<header>

        style="flex:1;padding:8px;border:1px solid #ccc;border-radius:5px;font-size:0.85rem">
    </div>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('img-input').click()">
      <div id="drop-text">ここをタップして写真を選択（複数枚OK）<br><small>納品書・値札など</small></div>
      <input type="file" id="img-input" accept="image/*" multiple style="display:none" onchange="loadImages(this)">
      <div id="thumb-row" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:8px"></div>
    </div>
    <div class="ocr-status" id="ocr-status" style="display:none"></div>
    <div id="ocr-items-area" style="display:none">
      <p style="font-size:0.85rem;color:#555;margin-bottom:8px;">追加する品目にチェックを入れて「まとめて追加」してください</p>
      <div id="ocr-items-list"></div>
    </div>
    <div class="modal-btns" style="margin-top:14px">
      <button class="btn btn-gray" onclick="closeOcr()">キャンセル</button>
      <button class="btn btn-green" id="ocr-add-btn" onclick="addFromOcr()" style="display:none">まとめて追加</button>
    </div>
  </div>
</div>

let currentMonth = ''; // 'YYYY-MM'

function monthKey(ym) { return `inv_${ym}`; }

function initMonth(ym) {
  currentMonth = ym;
  document.getElementById('month-label').textContent =
    ym.replace(/^(\d{4})-(\d{2})$/, '$1年$2月');
  const saved = localStorage.getItem(monthKey(ym));
  if (saved) {
    data = JSON.parse(saved);
    // priceExがない古いデータをマイグレーション
    DATA_CATS.forEach(cat => {
      data[cat] = (data[cat] || []).map(x => ({
        ...x,
        priceEx: x.priceEx != null ? x.priceEx : Math.round(x.price / (TAX_RATE[cat] || 1.10))
      }));
    });
    // 保存データが空（品目0件）の場合はRAWで再初期化
    const hasItems = DATA_CATS.some(cat => data[cat] && data[cat].length > 0);
    if (hasItems) return;
    localStorage.removeItem(monthKey(ym)); // 壊れたデータを削除
  }
  // RAWデータで初期化
  DATA_CATS.forEach(cat => {
    data[cat] = RAW[cat].map(([name, unit, priceEx, qty]) => ({
      name, unit, priceEx, price: tin(priceEx, cat), qty
    }));
  });
  save();
}

function save() { localStorage.setItem(monthKey(currentMonth), JSON.stringify(data)); }

function latestSavedData() {
  const keys = Object.keys(localStorage)
    .filter(k => k.startsWith('inv_'))
    .sort().reverse();
  if (!keys.length) return null;
  try { return JSON.parse(localStorage.getItem(keys[0])); } catch { return null; }
}

function changeMonth(delta) {
  const [y, m] = currentMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  initMonth(ym);
  renderTabs();
  renderPanel();
}

let activeTab = 'サマリー';

function renderTabs() {
  document.getElementById('tabs').innerHTML = CATEGORIES.map(c =>
    `<div class="tab ${c===activeTab?'active':''}" onclick="switchTab('${c}')">${c}</div>`
  ).join('');
}

function switchTab(cat) {
  activeTab = cat;
  renderTabs();
  renderPanel();
}

// ---- サマリー ----
function renderSummary() {
  const grand = DATA_CATS.reduce((s,c) => s + catTotal(c), 0);
  const rows = DATA_CATS.map((cat, i) => {
    const amt = catTotal(cat);
    const pct = grand > 0 ? (amt / grand * 100) : 0;
    const barW = Math.round(pct * 1.2);
    return `<tr>
      <td>${i+1}. ${cat}
        <span class="summary-cat-bar" style="width:${barW}px;opacity:0.4"></span>
      </td>
      <td class="amt">¥${Math.round(amt).toLocaleString()}</td>
    </tr>`;
  }).join('');

  document.getElementById('panel').innerHTML = `
    <div class="card">
      <div class="card-header">
        <h2>部門別合計</h2>
        <div class="top-btns">
          <button class="btn btn-blue" onclick="downloadCSV()">CSVダウンロード</button>
          <button class="btn btn-orange" onclick="window.print()">印刷</button>
        </div>
      </div>
      <table class="summary-table">
        <thead><tr><th>部門</th><th style="text-align:right">金額（税込）</th></tr></thead>
        <tbody>
          ${rows}
          <tr class="grand">
            <td>合計</td>
            <td class="amt">¥${Math.round(grand).toLocaleString()}</td>
          </tr>
        </tbody>
      </table>
    </div>`;
  renderGrand();
}

function catTotal(cat) {
  return (data[cat] || []).reduce((s,x) => s + x.price * x.qty, 0);
}

// ---- カテゴリパネル ----
function renderPanel() {
  if (activeTab === 'サマリー') { renderSummary(); return; }
  const cat = activeTab;
  const items = data[cat];
  const totalAmt = items.reduce((s,x) => s + x.price * x.qty, 0);
  const totalQty = items.reduce((s,x) => s + x.qty, 0);
  const taxLabel = TAX_RATE[cat] === 1.08 ? '8%' : '10%';

  const rows = items.map((item, i) => {
    const sub = item.price * item.qty;
    return `<tr id="row-${i}">
      <td><input class="name-input" type="text" value="${item.name}" oninput="updateName('${cat}',${i},this.value)"><span class="print-name">${item.name}</span></td>
      <td class="muted">${item.unit}</td>
      <td class="right">
        <input class="qty-input" type="number" min="0" step="1"
          value="${item.priceEx}" oninput="updatePrice('${cat}',${i},this.value)"
          style="width:90px;text-align:right">
        <small class="muted"> →¥${item.price.toLocaleString()}</small>
      </td>
      <td class="right">
        <input class="qty-input" type="number" min="0" step="0.1"
          value="${item.qty}" oninput="updateQty('${cat}',${i},this.value)">
      </td>
      <td class="right" id="sub-${i}">${sub>0 ? '¥'+Math.round(sub).toLocaleString() : '<span class="muted">—</span>'}</td>
      <td><button class="btn-del" onclick="delItem('${cat}',${i})">削除</button></td>
    </tr>`;
  }).join('');

  document.getElementById('panel').innerHTML = `
    <div class="card">
      <div class="card-header">
        <h2>${cat}</h2>
        <div class="top-btns">
          <button class="btn btn-orange" onclick="openOcr()">写真から追加</button>
          <button class="btn btn-blue" onclick="downloadCSV()">CSVダウンロード</button>
          <button class="btn btn-orange" onclick="window.print()">印刷</button>
        </div>
      </div>
      <div class="form-row">
        <input type="text" id="f-name" placeholder="品名" />
        <input type="text" id="f-unit" placeholder="単位" style="max-width:70px" />
        <input type="number" id="f-price" placeholder="単価（税抜）" min="0" />
        <input type="number" id="f-qty" placeholder="数量" min="0" step="0.1" value="1" />
        <button class="btn btn-green" onclick="addItem()">追加</button>
      </div>
      <table>
        <thead><tr>
          <th>品名</th><th>単位</th>
          <th class="right">単価（税抜入力→税込）<span class="tax-badge">${taxLabel}込</span></th>
          <th class="right">数量</th>
          <th class="right">小計（税込）</th>
          <th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="section-total">
        <span>点数: <strong>${totalQty.toLocaleString()}</strong></span>
        <span>小計: <strong>¥${Math.round(totalAmt).toLocaleString()}</strong></span>
      </div>
    </div>`;
  renderGrand();
}

function renderGrand() {
  let total = 0, items = 0, qty = 0;
  DATA_CATS.forEach(cat => {
    data[cat].forEach(x => {
      total += x.price * x.qty;
      if (x.qty > 0) items++;
      qty += x.qty;
    });
  });
  document.getElementById('g-total').textContent = Math.round(total).toLocaleString();
  document.getElementById('g-items').textContent = items;
  document.getElementById('g-qty').textContent = qty.toLocaleString();
}

function updateQty(cat, i, val) {
  data[cat][i].qty = parseFloat(val) || 0;
  save();
  refreshRow(cat, i);
  refreshSectionTotal(cat);
  renderGrand();
}

function updateName(cat, i, val) {
  data[cat][i].name = val;
  save();
  // print-nameも同期
  const row = document.getElementById(`row-${i}`);
  if (row) { const pn = row.querySelector('.print-name'); if (pn) pn.textContent = val; }
}

function updatePrice(cat, i, val) {
  const priceEx = parseFloat(val) || 0;
  data[cat][i].priceEx = priceEx;
  data[cat][i].price = tin(priceEx, cat);
  save();
  refreshRow(cat, i);
  refreshSectionTotal(cat);
  renderGrand();
}

function refreshRow(cat, i) {
  const item = data[cat][i];
  const sub = item.price * item.qty;
  const subEl = document.getElementById(`sub-${i}`);
  if (subEl) subEl.innerHTML = sub > 0 ? '¥' + Math.round(sub).toLocaleString() : '<span class="muted">—</span>';
  // 税込表示を更新
  const row = document.getElementById(`row-${i}`);
  if (row) {
    const small = row.querySelector('small');
    if (small) small.textContent = ` →¥${item.price.toLocaleString()}`;
  }
}

function refreshSectionTotal(cat) {
  const items = data[cat];
  const totalAmt = items.reduce((s,x) => s + x.price * x.qty, 0);
  const totalQty = items.reduce((s,x) => s + x.qty, 0);
  const el = document.querySelector('.section-total');
  if (el) el.innerHTML =
    `<span>点数: <strong>${totalQty.toLocaleString()}</strong></span>
     <span>小計: <strong>¥${Math.round(totalAmt).toLocaleString()}</strong></span>`;
}

function addItem() {
  const name = document.getElementById('f-name').value.trim();
  const unit = document.getElementById('f-unit').value.trim() || '—';
  const priceEx = parseFloat(document.getElementById('f-price').value);
  const qty = parseFloat(document.getElementById('f-qty').value) || 0;
  if (!name || isNaN(priceEx)) { alert('品名と単価を入力してください'); return; }
  data[activeTab].push({ name, unit, priceEx, price: tin(priceEx, activeTab), qty });
  save();
  document.getElementById('f-name').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-qty').value = '1';
  renderPanel();
}

function delItem(cat, i) {
  if (!confirm(`「${data[cat][i].name}」を削除しますか？`)) return;
  data[cat].splice(i, 1);
  save(); renderPanel();
}

// ---- CSV（カテゴリ別区切り＋小計） ----
function downloadCSV() {
  const date = new Date().toLocaleDateString('ja-JP').replace(/\//g,'-');
  let csv = '﻿';
  let grand = 0;
  DATA_CATS.forEach(cat => {
    const taxLabel = TAX_RATE[cat] === 1.08 ? '8%' : '10%';
    csv += `\n【${cat}】（税率${taxLabel}）\n`;
    csv += `品名,単位,単価（税込）,数量,小計（税込）\n`;
    let sub = 0;
    data[cat].forEach(x => {
      const amt = Math.round(x.price * x.qty);
      sub += amt;
      csv += `"${x.name}","${x.unit}",${x.price},${x.qty},${amt}\n`;
    });
    csv += `,,,,小計,${Math.round(sub)}\n`;
    grand += sub;
  });
  csv += `\n合計（税込）,,,,,${Math.round(grand)}\n`;
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `棚卸し表_${currentMonth}.csv`;
  a.click();
}

// ---- APIキー管理 ----
function getApiKey() { return localStorage.getItem('claude_api_key') || ''; }
function saveApiKey(k) { localStorage.setItem('claude_api_key', k); }

// ---- OCR ----
let ocrDetectedItems = [];

function openOcr() {
  document.getElementById('ocr-cat').textContent = activeTab;
  document.getElementById('ocr-status').style.display = 'none';
  document.getElementById('ocr-items-area').style.display = 'none';
  document.getElementById('ocr-items-list').innerHTML = '';
  document.getElementById('ocr-add-btn').style.display = 'none';
  document.getElementById('thumb-row').innerHTML = '';
  document.getElementById('drop-text').innerHTML = 'ここをタップして写真を選択（複数枚OK）<br><small>納品書・値札など</small>';
  document.getElementById('img-input').value = '';
  ocrDetectedItems = [];
  document.getElementById('api-key-row').style.display = getApiKey() ? 'none' : 'flex';
  document.getElementById('ocr-modal').classList.add('open');
}

function closeOcr() {
  document.getElementById('ocr-modal').classList.remove('open');
}

function loadImages(input) {
  const files = Array.from(input.files);
  if (!files.length) return;

  // サムネイル表示
  const thumbRow = document.getElementById('thumb-row');
  thumbRow.innerHTML = '';
  document.getElementById('drop-text').textContent = `${files.length}枚選択済み`;

  // APIキー保存
  const keyInput = document.getElementById('api-key-input');
  if (keyInput && keyInput.value.trim()) saveApiKey(keyInput.value.trim());
  const apiKey = getApiKey();
  if (!apiKey) {
    showOcrStatus('APIキーを入力してください', 'error');
    return;
  }

  ocrDetectedItems = [];
  document.getElementById('ocr-items-area').style.display = 'none';
  document.getElementById('ocr-items-list').innerHTML = '';
  document.getElementById('ocr-add-btn').style.display = 'none';

  let processed = 0;
  showOcrStatus(`読み取り中... 0 / ${files.length}`, 'loading');

  files.forEach((file, idx) => {
    const reader = new FileReader();

    // サムネ
    const thumbReader = new FileReader();
    thumbReader.onload = e => {
      const img = document.createElement('img');
      img.src = e.target.result;
      img.style.cssText = 'height:60px;border-radius:4px;border:1px solid #ddd';
      thumbRow.appendChild(img);
    };
    thumbReader.readAsDataURL(file);

    reader.onload = async e => {
      try {
        const items = await runOcrOnImage(e.target.result, apiKey);
        ocrDetectedItems.push(...items);
      } catch(err) {
        console.error(err);
      }
      processed++;
      showOcrStatus(`読み取り中... ${processed} / ${files.length}`, 'loading');
      if (processed === files.length) {
        showOcrStatus(`完了！ ${ocrDetectedItems.length}件検出`, 'ok');
        renderOcrItems();
      }
    };
    reader.readAsDataURL(file);
  });
}

async function runOcrOnImage(src, apiKey) {
  const base64 = src.split(',')[1];
  const mediaType = src.split(';')[0].split(':')[1];

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 2048,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: `この画像は店舗の納品書・請求書・値札などです。
画像に含まれる全ての品目・税抜き単価・カテゴリを読み取ってください。
カテゴリは以下から最も適切なものを選んでください:
- 精肉: 牛・豚・鶏肉、内臓、ハム・ソーセージなど
- 食材: 野菜・魚介・乳製品・ソース・調理済み食品など
- 調味料: 醤油・酢・塩・砂糖・油・スパイスなど
- 酒/飲材: ビール・ワイン・日本酒・焼酎・ジュース・炭酸など
- 備品/包材: 洗剤・包装材・ラップ・手袋・消耗品など
JSON配列のみで返答してください（説明・コードブロック不要）:
[{"name":"品名","unit":"単位(k/本/p/個など)","price":数値,"category":"カテゴリ名"},...]` }
        ]
      }]
    })
  });

  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || res.status);
  }
  const json = await res.json();
  const text = json.content[0].text.trim().replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(text);
  return Array.isArray(parsed) ? parsed : [parsed];
}

function renderOcrItems() {
  if (!ocrDetectedItems.length) return;
  const list = document.getElementById('ocr-items-list');
  const catOptions = DATA_CATS.map(c => `<option value="${c}">${c}</option>`).join('');
  list.innerHTML = `
    <table class="ocr-item-table">
      <thead><tr>
        <th style="width:28px"><input type="checkbox" id="ocr-check-all" checked onchange="toggleAllOcr(this)"></th>
        <th>品名</th><th style="width:60px">単位</th><th style="width:85px">単価（税抜）</th><th style="width:55px">数量</th>
        <th style="width:100px">カテゴリ</th>
      </tr></thead>
      <tbody>
        ${ocrDetectedItems.map((item, i) => `
        <tr>
          <td><input type="checkbox" class="ocr-chk" checked></td>
          <td><input type="text" value="${item.name || ''}" oninput="ocrDetectedItems[${i}].name=this.value"></td>
          <td><input type="text" value="${item.unit || '—'}" oninput="ocrDetectedItems[${i}].unit=this.value"></td>
          <td><input type="number" value="${item.price || ''}" min="0" oninput="ocrDetectedItems[${i}].price=parseFloat(this.value)||0"></td>
          <td><input type="number" value="1" min="0" step="0.1" oninput="ocrDetectedItems[${i}].qty=parseFloat(this.value)||0"></td>
          <td><select onchange="ocrDetectedItems[${i}].category=this.value" style="width:100%;padding:4px;border:1px solid #ccc;border-radius:4px;font-size:0.8rem">
            ${DATA_CATS.map(c => `<option value="${c}" ${c===(item.category||activeTab)?'selected':''}>${c}</option>`).join('')}
          </select></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  // qtyを初期化
  ocrDetectedItems.forEach(x => x.qty = 1);
  document.getElementById('ocr-items-area').style.display = 'block';
  document.getElementById('ocr-add-btn').style.display = 'inline-block';
}

function toggleAllOcr(cb) {
  document.querySelectorAll('.ocr-chk').forEach(c => c.checked = cb.checked);
}

function showOcrStatus(msg, type) {
  const el = document.getElementById('ocr-status');
  el.style.display = 'block';
  el.textContent = msg;
  el.style.background = type === 'error' ? '#fef2f2' : type === 'ok' ? '#f0fdf4' : '#fffbeb';
  el.style.color = type === 'error' ? '#991b1b' : type === 'ok' ? '#166534' : '#92400e';
}

function addFromOcr() {
  const checks = document.querySelectorAll('.ocr-chk');
  let added = 0;
  ocrDetectedItems.forEach((item, i) => {
    if (!checks[i] || !checks[i].checked) return;
    if (!item.name || !item.price) return;
    const cat = DATA_CATS.includes(item.category) ? item.category : activeTab;
    data[cat].push({
      name: item.name,
      unit: item.unit || '—',
      priceEx: item.price,
      price: tin(item.price, cat),
      qty: item.qty || 1
    });
    added++;
  });
  if (added === 0) { alert('追加する品目を選択してください'); return; }
  save();
  closeOcr();
  renderPanel();
}

// drag & drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if (files.length) {
    const input = document.getElementById('img-input');
    const dt = new DataTransfer();
    files.forEach(f => dt.items.add(f));
    input.files = dt.files;
    loadImages(input);
  }
});

const now = new Date();
const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
initMonth(thisMonth);
renderTabs();
renderPanel();
</script>
